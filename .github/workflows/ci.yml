name: CI — Snake Game

on:
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile src/snake.py

      - name: Install pytest
        run: pip install pytest --quiet

      - name: Run test suite (hallucination detector)
        run: pytest tests/ -v
